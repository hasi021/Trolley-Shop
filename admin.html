<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro - Trolley Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
       .container { max-width: 1400px; margin: 0 auto; }
       .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); padding: 25px; margin-bottom: 20px; }
       .header { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 30px; }
       .header h1 { font-size: 28px; font-weight: 700; }
       .logout-btn { background: rgba(255, 255, 255, 0.2); border: none; padding: 10px 20px; border-radius: 10px; color: white; cursor: pointer; font-weight: 500; }
       .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }
       .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
       .stat-card { color: white; text-align: center; }
       .stat-card i { font-size: 30px; margin-bottom: 10px; opacity: 0.8; }
       .stat-card h3 { font-size: 32px; font-weight: 700; }
       .stat-card p { opacity: 0.8; font-size: 14px; }
       .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
       .tab-btn { background: rgba(255, 255, 255, 0.1); border: none; padding: 12px 24px; border-radius: 10px; color: white; cursor: pointer; font-weight: 500; position: relative; }
       .tab-btn.active { background: rgba(255, 255, 255, 0.3); }
       .tab-btn.badge { position: absolute; top: -5px; right: -5px; background: #ff4757; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
       .tab-content { display: none; }
       .tab-content.active { display: block; }
       .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: white; font-size: 14px; }
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.6); }
        input[type="file"] { padding: 8px; }
       .btn { background: #ff4757; border: none; padding: 12px 30px; border-radius: 10px; color: white; cursor: pointer; font-weight: 600; font-size: 14px; }
       .btn:hover { background: #ff3838; }
       .btn-small { padding: 6px 12px; font-size: 12px; margin: 2px; }
       .btn-green { background: #2ed573; }
       .btn-blue { background: #1e90ff; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { font-weight: 600; font-size: 13px; opacity: 0.8; }
        td { font-size: 14px; }
       .product-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
       .status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
       .status-pending { background: #ffa502; }
       .status-shipped { background: #1e90ff; }
       .status-done { background: #2ed573; }
       .review-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
       .review-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
       .stars { color: #ffa502; }
       .reply-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
       .login-box { max-width: 400px; margin: 100px auto; }
        #loginSection { display: block; }
        #dashboardSection { display: none; }
       .notification { position: fixed; top: 20px; right: 20px; background: #2ed573; color: white; padding: 15px 20px; border-radius: 10px; display: none; z-index: 1000; }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <!-- LOGIN -->
    <div id="loginSection">
        <div class="glass login-box">
            <h2 style="color: white; text-align: center; margin-bottom: 20px;"><i class="fas fa-lock"></i> Admin Login</h2>
            <input type="email" id="email" placeholder="Email" style="margin-bottom: 15px;">
            <input type="password" id="password" placeholder="Password" style="margin-bottom: 15px;">
            <button class="btn" style="width: 100%;" onclick="login()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="container">
        <div class="header">
            <h1><i class="fas fa-tachometer-alt"></i> Dashboard Pro V2.0</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="stats">
            <div class="glass stat-card">
                <i class="fas fa-box"></i>
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>
            <div class="glass stat-card">
                <i class="fas fa-shopping-bag"></i>
                <h3 id="totalOrders">0</h3>
                <p>Total Orders</p>
            </div>
            <div class="glass stat-card">
                <i class="fas fa-star"></i>
                <h3 id="totalReviews">0</h3>
                <p>Total Reviews</p>
            </div>
            <div class="glass stat-card">
                <i class="fas fa-rupee-sign"></i>
                <h3>Rs <span id="totalRevenue">0</span></h3>
                <p>Revenue</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">
                <i class="fas fa-box"></i> Products
            </button>
            <button class="tab-btn" onclick="switchTab('orders')">
                <i class="fas fa-shopping-bag"></i> Orders <span class="badge" id="orderBadge" style="display:none;">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('reviews')">
                <i class="fas fa-star"></i> Reviews <span class="badge" id="reviewBadge" style="display:none;">0</span>
            </button>
        </div>

        <!-- PRODUCTS TAB -->
        <div id="productsTab" class="tab-content active">
            <div class="glass">
                <h3 style="color: white; margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> Add New Product</h3>
                <div class="form-grid">
                    <input type="text" id="productName" placeholder="Product Name">
                    <input type="number" id="productPrice" placeholder="Price Rs">
                    <input type="number" id="productStock" placeholder="Stock Qty">
                    <input type="file" id="productImage" accept="image/*">
                </div>
                <textarea id="productDesc" placeholder="Product Description" rows="3" style="margin-bottom: 15px;"></textarea>
                <button class="btn" onclick="addProduct()"><i class="fas fa-upload"></i> Add Product</button>
            </div>

            <div class="glass">
                <h3 style="color: white; margin-bottom: 20px;"><i class="fas fa-list"></i> All Products</h3>
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div id="ordersTab" class="tab-content">
            <div class="glass">
                <h3 style="color: white; margin-bottom: 20px;"><i class="fas fa-shopping-bag"></i> Customer Orders</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
        </div>

        <!-- REVIEWS TAB -->
        <div id="reviewsTab" class="tab-content">
            <div class="glass">
                <h3 style="color: white; margin-bottom: 20px;"><i class="fas fa-star"></i> Customer Reviews</h3>
                <div id="reviewsBody"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

        const firebaseConfig = {
          apiKey: "AIzaSyBUP83LY0J1jtkqo_8vf2nhGtmHHfg8pYw",
          authDomain: "trolley-shop.firebaseapp.com",
          projectId: "trolley-shop",
          storageBucket: "trolley-shop.firebasestorage.app",
          messagingSenderId: "1032789464105",
          appId: "1:1032789464105:web:e4937c094e0eca8759b838",
          measurementId: "G-PVDS7M76GZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentTab = 'products';

        // AUTH
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadAllData();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert('Login Failed: ' + error.message);
            }
        };

        window.logout = () => signOut(auth);

        // TABS
        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        // PRODUCTS
        window.addProduct = async () => {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            const desc = document.getElementById('productDesc').value;
            const imageFile = document.getElementById('productImage').files[0];

            if (!name ||!price ||!stock ||!desc ||!imageFile) {
                alert('Sab fields bharo!');
                return;
            }

            try {
                const imageRef = ref(storage, `products/${Date.now()}_${imageFile.name}`);
                await uploadBytes(imageRef, imageFile);
                const imageUrl = await getDownloadURL(imageRef);

                await addDoc(collection(db, 'products'), {
                    name, price: Number(price), stock: Number(stock), desc, imageUrl,
                    createdAt: new Date()
                });

                showNotification('Product Added Successfully!');
                clearProductForm();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        function clearProductForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('productImage').value = '';
        }

        window.deleteProduct = async (id) => {
            if (confirm('Delete karna hai?')) {
                await deleteDoc(doc(db, 'products', id));
                showNotification('Product Deleted!');
            }
        };

        // ORDERS
        window.updateOrderStatus = async (id, status) => {
            await updateDoc(doc(db, 'orders', id), { status });
            showNotification('Order Status Updated!');
        };

        // REVIEWS
        window.replyToReview = async (id) => {
            const reply = prompt('Apna reply likho:');
            if (reply) {
                await updateDoc(doc(db, 'reviews', id), { 
                    adminReply: reply,
                    replyDate: new Date()
                });
                showNotification('Reply Posted!');
            }
        };

        // LOAD DATA
        function loadAllData() {
            // Products
            onSnapshot(query(collection(db, 'products'), orderBy('createdAt', 'desc')), (snapshot) => {
                const tbody = document.getElementById('productsBody');
                tbody.innerHTML = '';
                document.getElementById('totalProducts').textContent = snapshot.size;
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    tbody.innerHTML += `
                        <tr>
                            <td><img src="${data.imageUrl}" class="product-img"></td>
                            <td>${data.name}</td>
                            <td>Rs ${data.price}</td>
                            <td>${data.stock}</td>
                            <td>
                                <button class="btn btn-small btn-green" onclick="alert('Edit feature coming soon')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-small" onclick="deleteProduct('${doc.id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });

            // Orders
            onSnapshot(query(collection(db, 'orders'), orderBy('createdAt', 'desc')), (snapshot) => {
                const tbody = document.getElementById('ordersBody');
                tbody.innerHTML = '';
                document.getElementById('totalOrders').textContent = snapshot.size;
                let revenue = 0;
                let pendingCount = 0;
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    revenue += data.amount || 0;
                    if (data.status === 'pending') pendingCount++;
                    
                    const date = data.createdAt?.toDate().toLocaleDateString() || 'N/A';
                    tbody.innerHTML += `
                        <tr>
                            <td>#${doc.id.slice(0,6)}</td>
                            <td>${data.customerName}<br><small>${data.customerPhone}</small></td>
                            <td>${data.productName}</td>
                            <td>Rs ${data.amount}</td>
                            <td><span class="status status-${data.status}">${data.status}</span></td>
                            <td>${date}</td>
                            <td>
                                <button class="btn btn-small btn-blue" onclick="updateOrderStatus('${doc.id}', 'shipped')"><i class="fas fa-truck"></i></button>
                                <button class="btn btn-small btn-green" onclick="updateOrderStatus('${doc.id}', 'done')"><i class="fas fa-check"></i></button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('totalRevenue').textContent = revenue;
                const badge = document.getElementById('orderBadge');
                if (pendingCount > 0) {
                    badge.textContent = pendingCount;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            });

            // Reviews
            onSnapshot(query(collection(db, 'reviews'), orderBy('createdAt', 'desc')), (snapshot) => {
                const body = document.getElementById('reviewsBody');
                body.innerHTML = '';
                document.getElementById('totalReviews').textContent = snapshot.size;
                let unrepliedCount = 0;
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (!data.adminReply) unrepliedCount++;
                    
                    const stars = '★'.repeat(data.rating) + '☆'.repeat(5 - data.rating);
                    const date = data.createdAt?.toDate().toLocaleDateString() || 'N/A';
                    
                    body.innerHTML += `
                        <div class="review-card">
                            <div class="review-header">
                                <div>
                                    <strong>${data.customerName}</strong> - ${data.productName}
                                    <div class="stars">${stars}</div>
                                </div>
                                <small>${date}</small>
                            </div>
                            <p style="color: white; margin-bottom: 10px;">${data.comment}</p>
                            ${data.adminReply? `
                                <div class="reply-box">
                                    <strong style="color: #2ed573;"><i class="fas fa-reply"></i> Your Reply:</strong>
                                    <p style="color: rgba(255,255,255,0.8); margin-top: 5px;">${data.adminReply}</p>
                                </div>
                            ` : `
                                <button class="btn btn-small btn-blue" onclick="replyToReview('${doc.id}')"><i class="fas fa-reply"></i> Reply</button>
                            `}
                        </div>
                    `;
                });
                
                const badge = document.getElementById('reviewBadge');
                if (unrepliedCount > 0) {
                    badge.textContent = unrepliedCount;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            });
        }

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    </script>
</body>
</html>

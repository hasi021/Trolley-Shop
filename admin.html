<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trolley Shop - Admin Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
      .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; }
      .login-box { max-width: 400px; margin: 100px auto; padding: 40px; }
      .form-control,.form-select { background: rgba(255,255,255,0.2); border: none; color: white; }
      .form-control::placeholder { color: rgba(255,255,255,0.7); }
      .form-control:focus { background: rgba(255,255,255,0.3); color: white; box-shadow: none; }
      .btn-pro { background: linear-gradient(45deg, #ff6b6b, #ee5a24); border: none; padding: 12px; font-weight: 600; }
        #dashboard { display: none; }
      .stat-card { transition: 0.3s; cursor: pointer; }
      .stat-card:hover { transform: translateY(-5px); }
      .table-glass { background: rgba(255,255,255,0.05); }
      .table-glass th,.table-glass td { color: white; border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box glass text-white">
        <div class="text-center mb-4">
            <i class="fas fa-shopping-cart fa-3x mb-3"></i>
            <h2>Trolley Shop</h2>
            <p>Admin Panel Pro - Firebase</p>
        </div>
        <div class="mb-3">
            <label>Admin Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@trolley.com" value="admin@trolley.com">
        </div>
        <div class="mb-4">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>
        <button onclick="login()" class="btn btn-pro w-100 text-white">Login to Dashboard</button>
        <p id="loginError" class="text-warning mt-3 text-center"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 text-white">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard Pro</h2>
        <button onclick="logout()" class="btn btn-light"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- STATS -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="glass p-4 text-white stat-card">
                <h5><i class="fas fa-box"></i> Total Products</h5>
                <h2 id="totalProducts">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass p-4 text-white stat-card">
                <h5><i class="fas fa-shopping-bag"></i> Total Orders</h5>
                <h2 id="totalOrders">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass p-4 text-white stat-card">
                <h5><i class="fas fa-rupee-sign"></i> Revenue</h5>
                <h2 id="totalRevenue">Rs 0</h2>
            </div>
        </div>
    </div>

    <!-- ADD PRODUCT -->
    <div class="glass p-4 text-white mb-4">
        <h4 class="mb-3"><i class="fas fa-plus-circle"></i> Add New Product</h4>
        <div class="row">
            <div class="col-md-4 mb-3">
                <input type="text" id="pName" class="form-control" placeholder="Product Name">
            </div>
            <div class="col-md-2 mb-3">
                <input type="number" id="pPrice" class="form-control" placeholder="Price Rs">
            </div>
            <div class="col-md-2 mb-3">
                <input type="number" id="pStock" class="form-control" placeholder="Stock Qty">
            </div>
            <div class="col-md-4 mb-3">
                <input type="file" id="pImage" class="form-control" accept="image/*">
            </div>
            <div class="col-12 mb-3">
                <textarea id="pDesc" class="form-control" placeholder="Product Description" rows="2"></textarea>
            </div>
            <div class="col-12">
                <button onclick="addProduct()" class="btn btn-pro text-white"><i class="fas fa-upload"></i> Add Product</button>
                <span id="uploadStatus" class="ms-3"></span>
            </div>
        </div>
    </div>

    <!-- PRODUCT LIST -->
    <div class="glass p-4 text-white">
        <h4 class="mb-3"><i class="fas fa-list"></i> All Products</h4>
        <div class="table-responsive">
            <table class="table table-glass">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="productList"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- FIREBASE + JS -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDtbCDbATK5vDeoYgMHOA2qEK0AvaRXLUk",
        authDomain: "trolley-shop-9c8a1.firebaseapp.com",
        projectId: "trolley-shop-9c8a1",
        storageBucket: "trolley-shop-9c8a1.appspot.com",
        messagingSenderId: "582098420786",
        appId: "1:582098420786:web:9c8a1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Auto check if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadProducts();
            loadStats();
        }
    });

    window.login = function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
                document.getElementById('loginError').innerText = '';
            })
          .catch((error) => {
                document.getElementById('loginError').innerText = 'Wrong email or password! Firebase: ' + error.message;
            });
    }

    window.logout = function() {
        signOut(auth).then(() => {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        });
    }

    window.addProduct = async function() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        const desc = document.getElementById('pDesc').value;
        const imageFile = document.getElementById('pImage').files[0];
        const status = document.getElementById('uploadStatus');

        if (!name ||!price ||!stock ||!imageFile) {
            alert('Fill all fields + select image!');
            return;
        }

        status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

        try {
            // Upload image to Firebase Storage
            const storageRef = ref(storage, 'products/' + Date.now() + '_' + imageFile.name);
            await uploadBytes(storageRef, imageFile);
            const imageUrl = await getDownloadURL(storageRef);

            // Save to Firestore
            await addDoc(collection(db, "products"), {
                name: name,
                price: Number(price),
                stock: Number(stock),
                description: desc,
                image: imageUrl,
                createdAt: new Date()
            });

            status.innerHTML = '<i class="fas fa-check text-success"></i> Product Added!';
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pStock').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pImage').value = '';
            
            setTimeout(() => status.innerHTML = '', 3000);
        } catch (error) {
            status.innerHTML = '<i class="fas fa-times text-danger"></i> Error: ' + error.message;
        }
    }

    function loadProducts() {
        onSnapshot(collection(db, "products"), (snapshot) => {
            const tbody = document.getElementById('productList');
            tbody.innerHTML = '';
            let count = 0;
            
            snapshot.forEach((doc) => {
                count++;
                const data = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${data.image}" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>
                        <td>${data.name}</td>
                        <td>Rs ${data.price}</td>
                        <td>${data.stock}</td>
                        <td><button onclick="deleteProduct('${doc.id}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `;
            });
            document.getElementById('totalProducts').innerText = count;
        });
    }

    window.deleteProduct = async function(id) {
        if (confirm('Delete this product?')) {
            await deleteDoc(doc(db, "products", id));
        }
    }

    function loadStats() {
        // Orders count - dummy for now
        document.getElementById('totalOrders').innerText = '0';
        document.getElementById('totalRevenue').innerText = 'Rs 0';
    }
</script>

</body>
</html>

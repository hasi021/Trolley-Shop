<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trolley Shop 2050 - Next-Gen Shopping</title>
    
    <!-- FAVICON - TAB MEIN LOGO -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/6n0J4Y7/trolley-logo.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #0a0a1a; color: white; }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a1a3a, #0a0a1a);
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* CIRCLE WALA LOGO - HOVER PE GHOOMEGA */
        .logo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s ease;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }
        
        .logo-circle:hover {
            transform: rotate(360deg);
        }
        
        .logo-circle img {
            width: 30px;
            height: 30px;
            filter: brightness(0) invert(1);
        }
        
        .brand-name {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            width: 300px;
        }
        
        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 100px 5%;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0a0a1a 100%);
        }
        
        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <!-- HEADER WITH SPINNING LOGO -->
    <header class="header">
        <div class="logo-section">
            <div class="logo-circle">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 18C5.9 18 5 18.9 5 20C5 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5H5.21L4.27 3H1ZM17 18C15.9 18 15 18.9 15 20C15 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18Z" fill="white"/>
                </svg>
            </div>
            <div class="brand-name">Trolley Shop</div>
        </div>
        
        <input type="text" class="search-box" placeholder="Search products...">
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1>Next-Gen Shopping Experience</h1>
        <p>Welcome to Trolley Shop 2050 - All Features Complete</p>
    </section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trolley Shop V2.2 - Pro 2050</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/vxV4Y7Lk/trolley-shop.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6366f1;--secondary:#8b5cf6;--accent:#ec4899;--dark:#0a0e27;--darker:#050814;--light:#f8fafc;--gray:#94a3b8;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--jazzcash:#E2136E;--gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);--gradient-2:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);--glass:rgba(255,255,255,0.05)}
        body{font-family:'Outfit',sans-serif;background:var(--darker);color:var(--light);overflow-x:hidden;padding-bottom:70px}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(99,102,241,0.2) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(139,92,246,0.2) 0%,transparent 50%);pointer-events:none;z-index:0}
        .container{max-width:1400px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
        
        /* HEADER */
        header{background:rgba(10,14,39,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);padding:16px 0;position:sticky;top:0;z-index:1000}
        .header-content{display:flex;justify-content:space-between;align-items:center;gap:16px}
        .logo{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
        .logo-img{width:44px;height:44px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(99,102,241,0.8);animation:pulse 2s ease-in-out infinite;overflow:hidden;padding:4px}
        @keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(99,102,241,0.8)}50%{box-shadow:0 0 50px rgba(99,102,241,1)}}
        .logo-img img{width:100%;height:100%;object-fit:contain}
        .header-actions{display:flex;gap:10px;align-items:center}
        .icon-btn{width:42px;height:42px;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
        .cart-count{position:absolute;top:-6px;right:-6px;background:var(--danger);color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
        
        /* SEARCH OVERLAY */
        .search-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,39,0.98);backdrop-filter:blur(20px);z-index:3000;display:none;animation:slideDown 0.3s ease}
        .search-overlay.active{display:block}
        @keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
        .search-header{padding:20px;display:flex;gap:12px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1)}
        .search-input-wrap{flex:1;position:relative}
        .search-input-wrap input{width:100%;padding:14px 50px 14px 20px;background:var(--glass);border:1px solid rgba(255,255,255,0.2);border-radius:16px;color:var(--light);font-size:16px}
        .search-input-wrap input:focus{outline:none;border-color:var(--primary)}
        .search-input-wrap i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--gray)}
        .close-search{width:42px;height:42px;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .search-results{padding:20px;max-height:calc(100vh - 100px);overflow-y:auto}
        
        /* CATEGORIES */
        .hero{padding:30px 0 20px}
        .category-pills{display:flex;gap:10px;overflow-x:auto;padding:10px 0 20px;margin-bottom:10px;scrollbar-width:none}
        .category-pills::-webkit-scrollbar{display:none}
        .category-pill{padding:10px 20px;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:var(--light);font-weight:600;font-size:14px;white-space:nowrap;cursor:pointer;transition:all 0.3s ease}
        .category-pill:hover,.category-pill.active{background:var(--gradient);border-color:transparent;transform:translateY(-2px)}
        
        /* PRODUCTS GRID */
        .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:30px}
        .product-card{background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.3s ease}
        .product-card:hover{transform:translateY(-5px);border-color:rgba(99,102,241,0.5);box-shadow:0 10px 40px rgba(99,102,241,0.3)}
        .product-img-wrap{position:relative;overflow:hidden;height:180px;background:rgba(0,0,0,0.2)}
        .product-img{width:100%;height:100%;object-fit:cover}
        .product-badge{position:absolute;top:10px;left:10px;padding:4px 10px;background:var(--gradient-2);border-radius:12px;font-size:10px;font-weight:700;color:white}
        .discount-badge{position:absolute;top:10px;right:10px;padding:4px 8px;background:var(--danger);border-radius:8px;font-size:10px;font-weight:700}
        .product-info{padding:12px}
        .product-name{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.4;height:36px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
        .product-price{font-size:18px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
        .product-price-old{font-size:12px;color:var(--gray);text-decoration:line-through}
        .product-sold{font-size:11px;color:var(--gray);display:flex;align-items:center;gap:4px;margin-top:4px}
        .product-rating{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--warning);margin-top:4px}
        .product-btns{display:flex;gap:6px;margin-top:10px}
        .btn-add{flex:1;padding:10px;background:var(--gradient);border:none;border-radius:10px;color:white;font-weight:700;cursor:pointer;font-size:12px}
        .btn-buy{flex:1;padding:10px;background:var(--jazzcash);border:none;border-radius:10px;color:white;font-weight:700;cursor:pointer;font-size:12px}
        
        /* DETAIL MODAL */
        .detail-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--darker);z-index:4000;overflow-y:auto}
        .detail-modal.active{display:block}
        .detail-header{position:sticky;top:0;background:rgba(10,14,39,0.95);backdrop-filter:blur(20px);padding:16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);z-index:10}
        .back-btn{width:40px;height:40px;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .detail-images{width:100%;height:400px;background:rgba(0,0,0,0.3);position:relative}
        .detail-images img{width:100%;height:100%;object-fit:cover}
        .detail-info{padding:20px}
        .detail-price{font-size:32px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .detail-name{font-size:20px;font-weight:700;margin-bottom:12px}
        .detail-meta{display:flex;gap:16px;margin-bottom:16px;font-size:13px;color:var(--gray)}
        .detail-desc{color:var(--gray);line-height:1.8;margin-bottom:20px}
        .detail-specs{background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;margin-bottom:20px}
        .spec-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .spec-row:last-child{border-bottom:none}
        .detail-actions{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,39,0.95);backdrop-filter:blur(20px);padding:16px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:10px}
        .detail-btn{flex:1;padding:16px;border:none;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer}
        .detail-btn-cart{background:var(--glass);border:1px solid rgba(255,255,255,0.2);color:var(--light)}
        .detail-btn-buy{background:var(--jazzcash);color:white}
        
        /* CATEGORIES SIDEBAR */
        .cat-sidebar{position:fixed;left:-100%;top:0;width:85%;height:100%;background:var(--dark);z-index:3500;transition:left 0.3s ease;overflow-y:auto}
        .cat-sidebar.active{left:0}
        .cat-sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
        .cat-list{padding:10px}
        .cat-item{padding:14px 16px;background:var(--glass);border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
        .cat-item i{font-size:20px;color:var(--primary)}
        
        /* BOTTOM NAV */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,39,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-around;padding:12px 0;z-index:999}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--gray);cursor:pointer;font-size:11px;transition:all 0.3s ease}
        .nav-item.active{color:var(--primary);transform:scale(1.1)}
        .nav-item i{font-size:20px}
        
        /* CART MODAL */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:2000;align-items:center;justify-content:center;padding:20px}
        .modal.active{display:flex}
        .modal-content{background:var(--dark);border:1px solid rgba(255,255,255,0.1);border-radius:24px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
        .modal-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
        .modal-header h2{font-size:20px;font-weight:800}
        .close-btn{background:var(--glass);border:1px solid rgba(255,255,255,0.1);color:var(--light);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px}
        .modal-body{padding:20px}
        .cart-item{display:flex;gap:12px;padding:12px;background:var(--glass);border-radius:14px;margin-bottom:12px}
        .cart-item img{width:70px;height:70px;object-fit:cover;border-radius:10px}
        .cart-item-info{flex:1}
        .cart-item-name{font-weight:600;font-size:14px;margin-bottom:4px}
        .cart-item-price{color:var(--primary);font-weight:800;font-size:16px}
        .qty-control{display:flex;gap:10px;align-items:center;margin-top:8px}
        .qty-btn{width:28px;height:28px;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--light);cursor:pointer}
        .remove-btn{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:var(--danger);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px}
        .cart-total{padding:16px;background:rgba(99,102,241,0.1);border-radius:14px;margin:16px 0;text-align:center}
        .cart-total h3{font-size:24px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .checkout-btn{width:100%;padding:16px;background:var(--gradient);border:none;border-radius:14px;color:white;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px}
        .jazzcash-btn{width:100%;padding:16px;background:var(--jazzcash);border:none;border-radius:14px;color:white;font-size:16px;font-weight:800;cursor:pointer}
        
        .empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
        .empty-state i{font-size:64px;margin-bottom:16px;opacity:0.3}
        .load-more{text-align:center;padding:20px}
        .load-more-btn{padding:12px 30px;background:var(--glass);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:var(--light);font-weight:600;cursor:pointer}
        
        @media(min-width:768px){
            .products-grid{grid-template-columns:repeat(4,1fr);gap:20px}
            .product-img-wrap{height:240px}
            .product-name{font-size:15px}
            .product-price{font-size:22px}
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="scrollToHome()">
                    <div class="logo-img">
                        <img src="https://i.ibb.co/vxV4Y7Lk/trolley-shop.png" alt="Logo">
                    </div>
                    <span>Trolley Shop V2.2</span>
                </div>
                <div class="header-actions">
                    <div class="icon-btn" onclick="openSearch()">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="icon-btn" onclick="openCart()">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-header">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="Search 600+ products..." onkeyup="handleSearch(event)">
                <i class="fas fa-search"></i>
            </div>
            <div class="close-search" onclick="closeSearch()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="cat-sidebar" id="catSidebar">
        <div class="cat-sidebar-header">
            <h2><i class="fas fa-list"></i> Categories</h2>
            <div class="close-search" onclick="closeCatSidebar()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <div class="cat-list" id="catList"></div>
    </div>

    <div class="hero">
        <div class="container">
            <div class="category-pills" id="categoryPills"></div>
        </div>
    </div>

    <div class="container">
        <div class="products-grid" id="productsGrid"></div>
        <div class="load-more" id="loadMore" style="display:none">
            <button class="load-more-btn" onclick="loadMoreProducts()">Load More Products</button>
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="detail-header">
            <div class="back-btn" onclick="closeDetail()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div style="display:flex;gap:10px">
                <div class="icon-btn"><i class="fas fa-share-alt"></i></div>
                <div class="icon-btn"><i class="fas fa-heart"></i></div>
            </div>
        </div>
        <div id="detailContent"></div>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-shopping-cart"></i> My Cart</h2>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>
            <div class="modal-body" id="cartBody"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navClick('home')">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="navClick('categories')">
            <i class="fas fa-th-large"></i>
            <span>Categories</span>
        </div>
        <div class="nav-item" onclick="navClick('cart')">
            <i class="fas fa-shopping-bag"></i>
            <span>Cart</span>
        </div>
        <div class="nav-item" onclick="navClick('account')">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = '923462872486';
        const JAZZCASH_NUMBER = '03310439111';
        
        let allProducts = JSON.parse(localStorage.getItem('adminProducts')) || [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let displayedProducts = [];
        let currentPage = 0;
        const productsPerPage = 20;
        let currentCategory = 'all';
        
        const categories = [
            {id:'all',name:'All Products',icon:'fa-border-all'},
            {id:'mobile',name:'Mobile Phones',icon:'fa-mobile-alt'},
            {id:'electronics',name:'Electronics',icon:'fa-laptop'},
            {id:'gents',name:'Men\'s Fashion',icon:'fa-male'},
            {id:'girls',name:'Women\'s Fashion',icon:'fa-female'},
            {id:'kids',name:'Kids & Toys',icon:'fa-child'},
            {id:'toys',name:'Toys & Games',icon:'fa-gamepad'},
            {id:'fashion',name:'Fashion',icon:'fa-tshirt'},
            {id:'accessories',name:'Accessories',icon:'fa-gem'},
            {id:'beauty',name:'Beauty',icon:'fa-spa'},
            {id:'home',name:'Home & Living',icon:'fa-home'},
            {id:'sports',name:'Sports',icon:'fa-futbol'}
        ];
        
        function initApp(){
            renderCategoryPills();
            renderCatSidebar();
            renderProducts();
            updateCartCount();
        }
        
        function renderCategoryPills(){
            const pills = document.getElementById('categoryPills');
            pills.innerHTML = categories.map(cat=>`
                <div class="category-pill ${cat.id==='all'?'active':''}" onclick="filterCategory('${cat.id}')">${cat.name}</div>
            `).join('');
        }
        
        function renderCatSidebar(){
            const list = document.getElementById('catList');
            list.innerHTML = categories.slice(1).map(cat=>`
                <div class="cat-item" onclick="filterCategorySidebar('${cat.id}')">
                    <i class="fas ${cat.icon}"></i>
                    <span>${cat.name}</span>
                </div>
            `).join('');
        }
        
        function filterCategory(catId){
            currentCategory = catId;
            document.querySelectorAll('.category-pill').forEach(p=>p.classList.remove('active'));
            event.target.classList.add('active');
            currentPage = 0;
            const filtered = catId==='all'?allProducts:allProducts.filter(p=>p.category===catId);
            displayedProducts = filtered.slice(0,productsPerPage);
            renderProductsGrid();
            document.getElementById('loadMore').style.display = filtered.length > productsPerPage ? 'block' : 'none';
            window.scrollTo({top:0,behavior:'smooth'});
        }
        
        function filterCategorySidebar(catId){
            closeCatSidebar();
            const pill = Array.from(document.querySelectorAll('.category-pill')).find(p=>p.textContent.includes(categories.find(c=>c.id===catId).name));
            if(pill){
                document.querySelectorAll('.category-pill').forEach(p=>p.classList.remove('active'));
                pill.classList.add('active');
            }
            currentCategory = catId;
            currentPage = 0;
            const filtered = allProducts.filter(p=>p.category===catId);
            displayedProducts = filtered.slice(0,productsPerPage);
            renderProductsGrid();
            document.getElementById('loadMore').style.display = filtered.length > productsPerPage ? 'block' : 'none';
            window.scrollTo({top:0,behavior:'smooth'});
        }
        
        function renderProducts(){
            displayedProducts = allProducts.slice(0,productsPerPage);
            renderProductsGrid();
            document.getElementById('loadMore').style.display = allProducts.length > productsPerPage ? 'block' : 'none';
        }
        
        function renderProductsGrid(){
            const grid = document.getElementById('productsGrid');
            if(displayedProducts.length===0){
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i><h3>No Products Found</h3><p>Add products from Admin Panel</p></div>`;
                return;
            }
            grid.innerHTML = displayedProducts.map(p=>`
                <div class="product-card" onclick="openDetail(${p.id})">
                    <div class="product-img-wrap">
                        <img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy">
                        ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
                        ${p.discount?`<span class="discount-badge">-${p.discount}%</span>`:''}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">Rs ${p.price.toLocaleString()}</div>
                        ${p.oldPrice?`<div class="product-price-old">Rs ${p.oldPrice.toLocaleString()}</div>`:''}
                        <div class="product-sold"><i class="fas fa-fire"></i> ${p.sold||0} sold</div>
                        <div class="product-rating">
                            ${'<i class="fas fa-star"></i>'.repeat(5)}
                            <span style="color:var(--gray);margin-left:4px">(${p.reviews||0})</span>
                        </div>
                        <div class="product-btns" onclick="event.stopPropagation()">
                            <button class="btn-add" onclick="addToCart(${p.id})">Add</button>
                            <button class="btn-buy" onclick="buyNow(${p.id})">Buy</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function loadMoreProducts(){
            currentPage++;
            const filtered = currentCategory==='all'?allProducts:allProducts.filter(p=>p.category===currentCategory);
            const start = currentPage * productsPerPage;
            const more = filtered.slice(start, start + productsPerPage);
            displayedProducts = [...displayedProducts, ...more];
            renderProductsGrid();
            if(displayedProducts.length >= filtered.length){
                document.getElementById('loadMore').style.display = 'none';
            }
        }
        
        function openDetail(id){
            const p = allProducts.find(x=>x.id===id);
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="detail-images">
                    <img src="${p.image}" alt="${p.name}">
                </div>
                <div class="detail-info">
                    <div class="detail-price">Rs ${p.price.toLocaleString()}</div>
                    ${p.oldPrice?`<div style="color:var(--gray);text-decoration:line-through;margin-bottom:8px">Rs ${p.oldPrice.toLocaleString()}</div>`:''}
                    <div class="detail-name">${p.name}</div>
                    <div class="detail-meta">
                        <span><i class="fas fa-star" style="color:var(--warning)"></i> 4.${Math.floor(Math.random()*9)} (${p.reviews||0})</span>
                        <span><i class="fas fa-fire" style="color:var(--danger)"></i> ${p.sold||0} sold</span>
                    </div>
                    <div class="detail-desc">${p.description}</div>
                    <div class="detail-specs">
                        <h3 style="margin-bottom:12px">Specifications</h3>
                        <div class="spec-row"><span>Category</span><strong>${p.category.toUpperCase()}</strong></div>
                        <div class="spec-row"><span>Stock</span><strong>${p.stock||0} available</strong></div>
                        <div class="spec-row"><span>Brand</span><strong>Trolley Shop</strong></div>
                        <div class="spec-row"><span>Warranty</span><strong>7 Days Return</strong></div>
                        <div class="spec-row"><span>Delivery</span><strong>2-4 Days</strong></div>
                    </div>
                    <div style="height:80px"></div>
                </div>
                <div class="detail-actions">
                    <button class="detail-btn detail-btn-cart" onclick="addToCart(${p.id});closeDetail()"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                    <button class="detail-btn detail-btn-buy" onclick="buyNow(${p.id})"><i class="fab fa-whatsapp"></i> Buy Now</button>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeDetail(){
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function openSearch(){
            document.getElementById('searchOverlay').classList.add('active');
            document.getElementById('searchInput').focus();
        }
        
        function closeSearch(){
            document.getElementById('searchOverlay').classList.remove('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }
        
        function handleSearch(e){
            const query = e.target.value.toLowerCase().trim();
            const results = document.getElementById('searchResults');
            if(query.length < 2){
                results.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Type at least 2 characters</p></div>';
                return;
            }
            const filtered = allProducts.filter(p=>
                p.name.toLowerCase().includes(query) || 
                p.description.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query)
            );
            if(filtered.length===0){
                results.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h3>No Results</h3><p>Try different keywords</p></div>';
            }else{
                results.innerHTML = `<div class="products-grid">${filtered.map(p=>`
                    <div class="product-card" onclick="closeSearch();openDetail(${p.id})">
                        <div class="product-img-wrap">
                            <img src="${p.image}" alt="${p.name}" class="product-img">
                            ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
                        </div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">Rs ${p.price.toLocaleString()}</div>
                            <div class="product-sold"><i class="fas fa-fire"></i> ${p.sold||0} sold</div>
                        </div>
                    </div>
                `).join('')}</div>`;
            }
        }
        
        function openCatSidebar(){
            document.getElementById('catSidebar').classList.add('active');
        }
        
        function closeCatSidebar(){
            document.getElementById('catSidebar').classList.remove('active');
        }
        
        function addToCart(id){
            const product = allProducts.find(p=>p.id===id);
            const existing = cart.find(i=>i.id===id);
            if(existing){existing.qty++}else{cart.push({...product,qty:1})}
            localStorage.setItem('cart',JSON.stringify(cart));
            updateCartCount();
        }
        
        function buyNow(id){
            const p = allProducts.find(x=>x.id===id);
            const msg = `*🛒 Buy Now - Trolley Shop V2.2*%0A%0A*Product:* ${p.name}%0A*Price:* Rs ${p.price.toLocaleString()}%0A*Category:* ${p.category.toUpperCase()}%0A*Description:* ${p.description}%0A%0A*📸 Product Image:*%0A${p.image}%0A%0A*💰 JazzCash Payment:*%0A${JAZZCASH_NUMBER}%0A%0APlease confirm this order!`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,'_blank');
        }
        
        function updateCartCount(){
            document.getElementById('cartCount').textContent = cart.reduce((sum,i)=>sum+i.qty,0);
        }
        
        function openCart(){
            const modal = document.getElementById('cartModal');
            const body = document.getElementById('cartBody');
            if(cart.length===0){
                body.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><h3>Cart is empty</h3></div>`;
            }else{
                const total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
                body.innerHTML = `
                    ${cart.map(i=>`
                        <div class="cart-item">
                            <img src="${i.image}" alt="${i.name}">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${i.name}</div>
                                <div class="cart-item-price">Rs ${i.price.toLocaleString()}</div>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty(${i.id},-1)">-</button>
                                    <span>${i.qty}</span>
                                    <button class="qty-btn" onclick="updateQty(${i.id},1)">+</button>
                                                                       <button class="qty-btn" onclick="updateQty(${i.id},-1)">-</button>
                                    <span>${i.qty}</span>
                                    <button class="qty-btn" onclick="updateQty(${i.id},1)">+</button>
                                    <button class="remove-btn" onclick="removeFromCart(${i.id})"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    <div class="cart-total"><h3>Total: Rs ${total.toLocaleString()}</h3></div>
                    <button class="checkout-btn" onclick="checkout()"><i class="fab fa-whatsapp"></i> Checkout on WhatsApp</button>
                    <button class="jazzcash-btn" onclick="checkoutJazzCash()"><i class="fas fa-mobile-alt"></i> Pay with JazzCash</button>
                `;
            }
            modal.classList.add('active');
        }
        
        function closeCart(){document.getElementById('cartModal').classList.remove('active')}
        
        function updateQty(id,change){
            const item=cart.find(i=>i.id===id);
            if(item){
                item.qty+=change;
                if(item.qty<=0){
                    removeFromCart(id)
                }else{
                    localStorage.setItem('cart',JSON.stringify(cart));
                    updateCartCount();
                    openCart()
                }
            }
        }
        
        function removeFromCart(id){
            cart=cart.filter(i=>i.id!==id);
            localStorage.setItem('cart',JSON.stringify(cart));
            updateCartCount();
            openCart()
        }
        
        function checkout(){
            const total=cart.reduce((sum,item)=>sum+item.price*item.qty,0);
            const msg=`*🛒 New Order from Trolley Shop V2.2*%0A%0A${cart.map(i=>`${i.name} x${i.qty} = Rs ${(i.price*i.qty).toLocaleString()}`).join('%0A')}%0A%0A*Total: Rs ${total.toLocaleString()}*%0A%0AConfirm this order!`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,'_blank');
        }
        
        function checkoutJazzCash(){
            const total=cart.reduce((sum,item)=>sum+item.price*item.qty,0);
            const msg=`*💰 JazzCash Payment - Trolley Shop V2.2*%0A%0A${cart.map(i=>`${i.name} x${i.qty} = Rs ${(i.price*i.qty).toLocaleString()}`).join('%0A')}%0A%0A*Total: Rs ${total.toLocaleString()}*%0A%0A*Pay to:* ${JAZZCASH_NUMBER}%0A%0ASend screenshot after payment!`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,'_blank');
        }
        
        function navClick(type){
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            if(type==='home'){scrollToHome()}
            if(type==='categories'){openCatSidebar()}
            if(type==='cart'){openCart()}
            if(type==='account'){openLogin()}
        }
        
        function scrollToHome(){window.scrollTo({top:0,behavior:'smooth'})}
        
        function openLogin(){
            const name = prompt('Enter your name:');
            if(name){
                localStorage.setItem('userName',name);
                alert(`Welcome ${name}! Account feature V2.3 mein full aayega`);
            }
        }
        
        // INIT
        window.onload = function(){
            initApp();
        }
        
        // LISTEN FOR ADMIN CHANGES - REAL TIME UPDATE
        window.addEventListener('storage', function(e) {
            if(e.key === 'adminProducts') {
                allProducts = JSON.parse(localStorage.getItem('adminProducts')) || [];
                initApp();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trolley Shop - Next Gen Shopping</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hasi021/Trolley-Shop/main/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            overflow-x: hidden;
        }

       .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(125deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
        }

       .bg-animation::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            animation: float 20s infinite ease-in-out;
        }

       .bg-animation::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: float 15s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }

       .navbar {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

       .logo {
            display: flex!important;
            align-items: center!important;
            gap: 12px!important;
            cursor: pointer;
        }

       .logo img {
            height: 50px!important;
            width: 50px!important;
            border-radius: 50%!important;
            object-fit: cover!important;
            border: 3px solid transparent!important;
            background: linear-gradient(135deg, #6366f1, #8b5cf6) padding-box,
                        linear-gradient(135deg, #6366f1, #ec4899) border-box!important;
            box-shadow: 0 0 30px rgba(99,102,241,0.8)!important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)!important;
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.8); }
            50% { box-shadow: 0 0 50px rgba(139,92,246,1), 0 0 70px rgba(236,72,153,0.5); }
        }

       .logo:hover img {
            transform: scale(1.2) rotate(15deg)!important;
        }

       .logo span {
            font-size: 26px!important;
            font-weight: 800!important;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899)!important;
            -webkit-background-clip: text!important;
            -webkit-text-fill-color: transparent!important;
            background-clip: text!important;
            background-size: 200% auto!important;
            animation: gradient-shift 3s ease infinite!important;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

       .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

       .search-box input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

       .search-box input:focus {
            outline: none;
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99,102,241,0.3);
        }

       .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

       .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

       .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
        }

       .nav-btn:hover {
            background: rgba(99,102,241,0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

       .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

       .hero {
            text-align: center;
            padding: 120px 5% 80px;
            position: relative;
        }

       .hero h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1s ease;
        }

       .hero p {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease 0.2s backwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

       .categories {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            padding: 0 5%;
        }

       .category-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

       .category-btn:hover,.category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: scale(1.05);
        }

       .products-section {
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

       .section-title {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

       .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

       .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

       .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(99,102,241,0.5);
            box-shadow: 0 20px 60px rgba(99,102,241,0.3);
        }

       .product-card:hover::before {
            opacity: 1;
        }

       .product-img-wrap {
            position: relative;
            overflow: hidden;
            height: 280px;
        }

       .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

       .product-card:hover.product-img {
            transform: scale(1.15);
        }

       .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

       .product-info {
            padding: 24px;
        }

       .product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

       .product-desc {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.6;
        }

       .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

       .product-price {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .add-cart-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

       .add-cart-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

       .add-cart-btn:hover::before {
            width: 300px;
            height: 300px;
        }

       .add-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(99,102,241,0.5);
        }

       .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

       .modal.active {
            display: flex;
        }

       .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

       .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

       .modal-header h2 {
            font-size: 28px;
            font-weight: 800;
        }

       .close-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }

       .close-btn:hover {
            background: rgba(239,68,68,0.2);
            border-color: #ef4444;
            transform: rotate(90deg);
        }

       .modal-body {
            padding: 24px;
        }

       .cart-item {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

       .cart-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
        }

       .cart-item-info {
            flex: 1;
        }

       .cart-item-name {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 16px;
        }

       .cart-item-price {
            color: #a5b4fc;
            font-weight: 600;
            margin-bottom: 8px;
        }

       .qty-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }

       .qty-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

       .qty-btn:hover {
            background: var(--primary);
        }

       .remove-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

       .cart-total {
            font-size: 32px;
            font-weight: 800;
            text-align: right;
            margin: 24px 0;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #25d366, #20ba5a);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

       .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(37,211,102,0.4);
        }

       .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

       .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

       .form-group {
            margin-bottom: 20px;
        }

       .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
        }

       .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }

       .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
        }

       .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

       .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }

        @media (max-width: 768px) {
           .navbar { flex-wrap: wrap; }
           .search-box { order: 3; flex-basis: 100%; }
           .hero h1 { font-size: 40px; }
           .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">
            <img src="https://raw.githubusercontent.com/hasi021/Trolley-Shop/main/logo.png" alt="Trolley Shop">
            <span>Trolley Shop</span>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
            <i class="fas fa-search"></i>
        </div>

        <div class="nav-actions">
            <button class="nav-btn" onclick="openLogin()">
                <i class="fas fa-user"></i> <span id="userName">Login</span>
            </button>
            <button class="nav-btn" onclick="openCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <h1>Next-Gen Shopping Experience</h1>
        <p>Discover premium products with instant WhatsApp ordering</p>
    </section>

    <div class="categories">
        <button class="category-btn active" onclick="filterCategory('all')">All Products</button>
        <button class="category-btn" onclick="filterCategory('electronics')">Electronics</button>
        <button class="category-btn" onclick="filterCategory('fashion')">Fashion</button>
        <button class="category-btn" onclick="filterCategory('accessories')">Accessories</button>
    </div>

    <section class="products-section">
        <h2 class="section-title">Featured Products</h2>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-shopping-cart"></i> Your Cart</h2>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>
            <div class="modal-body" id="cartBody"></div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-circle"></i> Customer Login</h2>
                <button class="close-btn" onclick="closeLogin()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="loginName" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="03XX XXXXXXX">
                </div>
                <button class="btn-primary" onclick="loginUser()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {id: 1, name: "Premium Wireless Headphones", price: 4999, category: "electronics", image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600", description: "Active noise cancellation with 40h battery", badge: "HOT"},
            {id: 2, name: "Smart Watch Pro Max", price: 8999, category: "electronics", image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600", description: "AMOLED display, health tracking", badge: "NEW"},
            {id: 3, name: "Genuine Leather Wallet", price: 2499, category: "accessories", image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=600", description: "Premium leather with RFID protection"},
            {id: 4, name: "Bluetooth Speaker Pro", price: 3499, category: "electronics", image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=600", description: "360° sound, waterproof IPX7", badge: "SALE"},
            {id: 5, name: "Designer Sunglasses", price: 1999, category: "fashion", image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600", description: "UV400 protection, polarized lenses"},
            {id: 6, name: "Laptop Backpack", price: 3999, category: "accessories", image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600", description: "Anti-theft design with USB port"},
            {id: 7, name: "Mechanical Keyboard", price: 6999, category: "electronics", image: "https://images.unsplash.com/photo-1589578228447-e1a4e481c6c8?w=600", description: "RGB backlit, blue switches", badge: "NEW"},
            {id: 8, name: "Running Shoes Pro", price: 5499, category: "fashion", image: "https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=600", description: "Lightweight with air cushion"}
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentCategory = 'all';
        let searchTerm = '';

        function init() {
            loadProducts();
            updateCartCount();
            updateUserDisplay();
        }

        function loadProducts() {
            const grid = document.getElementById('productsGrid');
            let filtered = products;

            if (currentCategory!== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            if (searchTerm) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.description.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-search"></i><p>No products found</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-img-wrap">
                        <img src="${product.image}" alt="${product.name}" class="product-img">
                        ${product.badge? `<div class="product-badge">${product.badge}</div>` : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price">Rs. ${product.price.toLocaleString()}</div>
                            <button class="add-cart-btn" onclick="addToCart(${product.id})">
                                <i class="fas fa-cart-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchProducts() {
            searchTerm = document.getElementById('searchInput').value;
            loadProducts();
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadProducts();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({...product, qty: 1});
            }

            saveCart();
            updateCartCount();
            showToast('Added to cart!');
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function openCart() {
            const modal = document.getElementById('cartModal');
            const body = document.getElementById('cartBody');

            if (cart.length === 0) {
                body.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p><p style="font-size:14px;margin-top:10px;">Add some products to get started!</p></div>';
            } else {
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                body.innerHTML = `
                    ${cart.map(item => `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">Rs. ${item.price.toLocaleString()}</div>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                    <span style="padding:0 12px;font-weight:700;">${item.qty}</span>
                                    <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                                </div>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `).join('')}
                    <div class="cart-total">Total: Rs. ${total.toLocaleString()}</div>
                    <button class="checkout-btn" onclick="checkout()">
                        <i class="fab fa-whatsapp"></i> Order on WhatsApp
                    </button>
                `;
            }

            modal.classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    removeFromCart(id);
                } else {
                    saveCart();
                    updateCartCount();
                    openCart();
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id!== id);
            saveCart();
            updateCartCount();
            openCart();
        }

        function checkout() {
            if (cart.length === 0) return;
            if (!currentUser) {
                closeCart();
                openLogin();
                showToast('Please login first!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let message = `*New Order from Trolley Shop*%0A%0A`;
            message += `*Customer:* ${currentUser.name}%0A`;
            message += `*Phone:* ${currentUser.phone}%0A%0A`;
            message += `*Order Details:*%0A`;

            cart.forEach(item => {
                message += `• ${item.name}%0A Qty: ${item.qty} x Rs. ${item.price.toLocaleString()} = Rs. ${(item.price * item.qty).toLocaleString()}%0A%0A`;
            });

            message += `*Total: Rs. ${total.toLocaleString()}*%0A%0APlease confirm my order.`;

            const whatsappNumber = "923001234567"; // <-- APNA NUMBER YAHAN DALNA
            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');

            cart = [];
            saveCart();
            updateCartCount();
            closeCart();
            showToast('Order sent to WhatsApp!');
        }

        function openLogin() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function loginUser() {
            const name = document.getElementById('loginName').value.trim();
            const phone = document.getElementById('loginPhone').value.trim();

            if (!name ||!phone) {
                showToast('Please fill all fields!');
                return;
            }

            currentUser = {name, phone};
            localStorage.setItem('user', JSON.stringify(currentUser));
            updateUserDisplay();
            closeLogin();
            showToast(`Welcome, ${name}!`);
        }

        function updateUserDisplay() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser.name.split(' ')[0];
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: linear-gradient(135deg, var(--primary), var(--secondary));
                color: white;
                padding: 16px 24px;
                border-radius: 12px;
                font-weight: 600;
                z-index: 9999;
                animation: slideInRight 0.3s ease;
                box-shadow: 0 10px 40px rgba(99,102,241,0.5);
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('cartModal').addEventListener('click', function(e) {
            if (e.target === this) closeCart();
        });

        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeLogin();
        });

        init();
    </script>
</body>
</html>
